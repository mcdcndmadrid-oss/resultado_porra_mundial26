<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026 · LCS · Clasificación</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--bg2:#0e1018;--bg3:#161822;--bg4:#1e2030;
  --border:#262840;--border2:#353760;
  --text:#e2e4f0;--muted:#6b6e8a;
  --gold:#f5c518;--red:#e63030;--green:#2ecc71;--blue:#4f8ef7;--cyan:#00d4ff;
  --mono:'DM Mono',monospace;--disp:'Bebas Neue',sans-serif;--body:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;min-height:100vh;}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#07080d 0%,#0d1520 50%,#07080d 100%);border-bottom:2px solid var(--gold);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(245,197,24,.06) 0%,transparent 65%);pointer-events:none;}
.hero h1{font-family:var(--disp);font-size:clamp(3rem,8vw,5.5rem);letter-spacing:4px;color:#fff;line-height:1;text-shadow:0 0 40px rgba(245,197,24,.25);}
.hero h1 span{color:var(--gold);}
.hero-sub{font-family:var(--mono);font-size:.8rem;letter-spacing:6px;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.hero-badges{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.hbadge{font-family:var(--mono);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;}
.hb-gold{background:var(--gold);color:var(--bg);}
.hb-dark{background:var(--bg4);color:var(--muted);border:1px solid var(--border);}
.hb-live{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3);}
.updated-badge{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-top:10px;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--border);overflow-x:auto;background:var(--bg2);position:sticky;top:0;z-index:100;}
.tab{background:none;border:none;font-family:var(--mono);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:13px 22px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── MAIN ── */
.main{max-width:1500px;margin:0 auto;padding:24px 20px 60px;transition:max-width .25s,padding .25s;}

/* ── MODO TABLA EXTENDIDA ── */
body.ext-mode .main{
  max-width:none;
  width:100%;
  padding:18px 18px 48px;
}
body.ext-mode .stat-row{
  display:none;
}
body.ext-mode .podium{
  display:none;
}
body.ext-mode .lb-toolbar{
  position:sticky;
  top:47px;
  z-index:20;
  background:linear-gradient(180deg,var(--bg) 60%,rgba(7,8,13,.85));
  padding:10px 0 12px;
  backdrop-filter:blur(8px);
  margin-bottom:8px;
}
body.ext-mode .ext-table{
  font-size:.8rem;
}
body.ext-mode .ext-table th{
  font-size:.62rem;
  padding:7px 8px;
}
body.ext-mode .ext-table td{
  padding:6px 8px;
}
body.ext-mode .ext-wrap{
  max-height:calc(100vh - 140px);
  overflow:auto;
  border:1px solid var(--border);
  border-radius:4px;
}
body.ext-mode .ext-table th.name-hdr,
body.ext-mode .ext-table th.tot-hdr{
  font-size:.65rem;
}
/* Stick all 3 header rows when in ext-mode */
body.ext-mode .ext-table thead tr:nth-child(1) th{ position:sticky; top:0; z-index:4; }
body.ext-mode .ext-table thead tr:nth-child(2) th{ position:sticky; top:29px; z-index:4; }
body.ext-mode .ext-table thead tr:nth-child(3) th{ position:sticky; top:55px; z-index:4; }
body.ext-mode .ext-table thead tr:nth-child(1) th.name-hdr,
body.ext-mode .ext-table thead tr:nth-child(1) th.tot-hdr{ z-index:6; }
body.ext-mode .ext-table td.name-cell{ z-index:2; }

/* ── PODIUM ── */
.podium{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:28px;}
.podium-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px 24px;text-align:center;min-width:130px;}
.podium-card.first{border-color:var(--gold);background:linear-gradient(180deg,rgba(245,197,24,.08),var(--bg2));}
.podium-medal{font-size:2.2rem;margin-bottom:6px;}
.podium-pos{font-family:var(--mono);font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.podium-team{font-family:var(--disp);font-size:1.1rem;letter-spacing:1px;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;}
.podium-card.first .podium-team{color:var(--gold);}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:22px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 14px;}
.stat-v{font-family:var(--disp);font-size:1.9rem;color:var(--gold);line-height:1;}
.stat-l{font-family:var(--mono);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* ── LEADERBOARD ── */
.lb-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;}
.lb-search{background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.78rem;padding:7px 12px;border-radius:3px;width:200px;}
.lb-search:focus{outline:none;border-color:var(--blue);}
.toggle-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}
.toggle-label{font-family:var(--mono);font-size:.72rem;color:var(--muted);transition:color .2s;}
body.ext-mode .toggle-label{color:var(--cyan);}
.toggle{position:relative;width:42px;height:22px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:var(--bg4);border:1px solid var(--border);border-radius:11px;transition:.2s;}
.toggle input:checked + .toggle-track{background:rgba(79,142,247,.3);border-color:var(--blue);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--muted);border-radius:50%;transition:.2s;}
.toggle input:checked ~ .toggle-thumb{left:23px;background:var(--blue);}
body.ext-mode .toggle input:checked + .toggle-track{background:rgba(0,212,255,.2);border-color:var(--cyan);}
body.ext-mode .toggle input:checked ~ .toggle-thumb{background:var(--cyan);}

/* compact table */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table thead tr{background:var(--bg4);}
.lb-table th{font-family:var(--mono);font-size:.63rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.lb-table td{padding:0;border-bottom:1px solid rgba(38,40,64,.45);}
.lb-table tbody tr{transition:background .1s;cursor:pointer;}
.lb-table tbody tr:hover{background:rgba(255,255,255,.02);}
.lb-table tbody tr.exp-open{background:rgba(79,142,247,.04);}
.lbc{padding:10px 10px;}
.rnum{font-family:var(--disp);font-size:1.25rem;line-height:1;}
.r1{color:var(--gold)}.r2{color:#c0c0c0}.r3{color:#cd7f32}.rx{color:var(--muted)}
.lb-name{font-weight:700;font-size:.9rem;}
.lb-pts-big{font-family:var(--disp);font-size:1.5rem;color:var(--gold);line-height:1;text-align:right;}
.lb-pts-sub{font-family:var(--mono);font-size:.58rem;color:var(--muted);text-align:right;}
.cat-pts{font-family:var(--mono);font-size:.8rem;font-weight:500;}
.pbar{height:3px;background:var(--bg4);border-radius:3px;margin-top:4px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:3px;}

/* expand row */
.exp-tr{display:none;}
.exp-tr.open{display:table-row;}
.exp-td{background:rgba(79,142,247,.03);border-bottom:1px solid var(--border) !important;padding:12px 10px;}
.exp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.exp-sec{font-family:var(--mono);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.pts-row{display:flex;justify-content:space-between;padding:3px 0;font-family:var(--mono);font-size:.74rem;border-bottom:1px solid rgba(38,40,64,.3);}
.pts-row:last-child{border-bottom:none;}
.pts-label{color:var(--text);}
.pts-val{font-weight:500;}
.c-gold{color:var(--gold)}.c-green{color:var(--green)}.c-zero{color:var(--muted)}.c-cyan{color:var(--cyan)}

/* extended table */
.ext-wrap{overflow-x:auto;width:100%;}
.ext-table{border-collapse:collapse;white-space:nowrap;font-size:.71rem;width:100%;}
.ext-table th{font-family:var(--mono);font-size:.57rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:6px 7px;text-align:center;border:1px solid var(--border);background:var(--bg4);}
.ext-table th.name-hdr{text-align:left;min-width:140px;position:sticky;left:0;z-index:3;background:var(--bg4);}
.ext-table th.tot-hdr{background:rgba(230,48,48,.1);color:var(--red);}
.ext-table td{padding:5px 7px;text-align:center;border:1px solid rgba(38,40,64,.4);}
.ext-table td.name-cell{text-align:left;font-weight:600;position:sticky;left:0;background:var(--bg3);z-index:1;border-right:2px solid var(--border);}
.ext-table td.tot-cell{font-family:var(--disp);font-size:1.1rem;color:var(--gold);background:rgba(245,197,24,.06);}
.ext-table tbody tr:hover td{background:rgba(255,255,255,.02);}
.ext-table tbody tr:hover td.name-cell{background:#1e2032;}
.ep{font-family:var(--mono);font-weight:500;}
.e-gold{color:var(--gold);background:rgba(245,197,24,.1);}
.e-grn{color:var(--green);background:rgba(46,204,113,.07);}
.e-cyan{color:var(--cyan);background:rgba(0,212,255,.07);}
.e-zero{color:var(--border2);}
/* kind-specific hit colours */
.ext-r16   {color:#00d4ff;background:rgba(0,212,255,.18);font-weight:700;}
.ext-oct   {color:#4f8ef7;background:rgba(79,142,247,.18);font-weight:700;}
.ext-qf    {color:#f5c518;background:rgba(245,197,24,.18);font-weight:700;}
.ext-sf    {color:#f58218;background:rgba(245,130,24,.2);font-weight:700;}
.ext-finalist{color:#e63030;background:rgba(230,48,48,.18);font-weight:700;}
.ext-third {color:#64b464;background:rgba(100,180,100,.18);font-weight:700;}
.ext-champion{color:#e63030;background:rgba(230,48,48,.22);font-weight:700;}
.ext-award {color:#2ecc71;background:rgba(46,204,113,.18);font-weight:700;}
.ext-exact {color:var(--gold)!important;background:rgba(245,197,24,.14)!important;}
.ext-res   {color:var(--green)!important;background:rgba(46,204,113,.09)!important;}
.ext-zero  {color:var(--border2);}

.team-with-flag{display:inline-flex;align-items:center;gap:5px;}
.team-with-flag.reverse{flex-direction:row-reverse;}
.match-venue{font-family:var(--mono);font-size:.58rem;color:#4a8aaf;margin-top:2px;}

/* ── RESULTS SECTION ── */
.results-phase{margin-bottom:28px;}
.phase-title{font-family:var(--disp);font-size:1.4rem;letter-spacing:3px;color:var(--red);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.match-card.played{border-color:rgba(46,204,113,.25);}
.mt{font-family:var(--mono);font-size:.82rem;font-weight:500;display:flex;align-items:center;}
.mt.h{justify-content:flex-end;}
.mt.winner .team-with-flag span,.mt.winner{color:var(--gold);}
.mt.pending,.mt.pending span{color:var(--muted);font-style:italic;}
.score-display{font-family:var(--disp);font-size:1.4rem;color:var(--text);text-align:center;white-space:nowrap;letter-spacing:2px;}
.score-display.played{color:var(--cyan);}
.score-display.tbd{color:var(--muted);font-size:.8rem;font-family:var(--mono);}
.match-date{font-family:var(--mono);font-size:.6rem;color:var(--muted);}

/* ── GROUPS TABLE ── */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;}
.grp-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.grp-hdr{background:var(--bg4);padding:8px 14px;font-family:var(--disp);font-size:1.1rem;letter-spacing:2px;color:var(--gold);border-bottom:1px solid var(--border);}
.grp-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.grp-table th{font-family:var(--mono);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);}
.grp-table th:first-child{text-align:left;padding-left:12px;}
.grp-table td{padding:7px 8px;text-align:center;border-bottom:1px solid rgba(38,40,64,.35);}
.grp-table td:first-child{text-align:left;padding-left:10px;}
.grp-table tr:last-child td{border-bottom:none;}
.grp-table tbody tr:hover{background:rgba(255,255,255,.02);}
.pb{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:3px;font-weight:700;font-size:.72rem;margin-right:4px;}
.pb1{background:var(--gold);color:var(--bg)}.pb2{background:#aaa;color:var(--bg)}.pb3{background:#cd7f32;color:var(--bg)}.pbx{background:var(--bg4);color:var(--muted)}
.pts-cell{font-weight:700;color:var(--gold);}
.q1 td:first-child{border-left:3px solid var(--gold);}
.q2 td:first-child{border-left:3px solid #aaa;}

/* ── KO CARD ── */
.ko-match-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.ko-card-hdr{background:var(--bg4);padding:5px 12px;display:flex;justify-content:space-between;}
.ko-card-lbl{font-family:var(--mono);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.ko-card-date{font-family:var(--mono);font-size:.62rem;color:var(--blue);}
.ko-card-body{padding:10px 13px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;}
.kt{font-family:var(--mono);font-size:.85rem;font-weight:500;display:flex;align-items:center;}
.kt.h{justify-content:flex-end;}
.kt.winner .team-with-flag span,.kt.winner{color:var(--gold);}
.kt.pending,.kt.pending span{color:var(--muted);font-style:italic;font-size:.75rem;}
.ko-score{font-family:var(--disp);font-size:1.2rem;color:var(--cyan);text-align:center;letter-spacing:2px;}
.ko-score.tbd{font-family:var(--mono);font-size:.75rem;color:var(--muted);}

/* ── ERROR / LOADING ── */
.loading{text-align:center;padding:80px 20px;color:var(--muted);}
.loading-spin{font-size:2.5rem;margin-bottom:14px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.error-box{background:rgba(230,48,48,.1);border:1px solid rgba(230,48,48,.3);border-radius:6px;padding:20px 24px;margin:20px 0;font-family:var(--mono);font-size:.82rem;color:#ff8080;line-height:1.7;}

/* ── SCROLLBARS ── */
/* Page-level: thin & dark */
html{scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
html::-webkit-scrollbar{width:6px;height:6px;}
html::-webkit-scrollbar-track{background:transparent;}
html::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
html::-webkit-scrollbar-thumb:hover{background:var(--muted);}
/* ext-wrap: same thin style */
.ext-wrap{scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.ext-wrap::-webkit-scrollbar{width:5px;height:5px;}
.ext-wrap::-webkit-scrollbar-track{background:transparent;}
.ext-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.ext-wrap::-webkit-scrollbar-thumb:hover{background:var(--muted);}
.ext-wrap::-webkit-scrollbar-corner{background:transparent;}

@media(max-width:768px){
  .main{padding:16px 12px 40px;}
  .match-grid,.groups-grid,.ko-grid,.ext-wrap{overflow-x:auto;}
  .podium{gap:12px;}
}
</style>
</head>
<body>

<div class="hero">
  <h1>MUNDIAL <span>2026</span></h1>
  <div class="hero-sub">USA · CANADA · MEXICO · 11 JUN – 19 JUL</div>
  <div class="hero-badges">
    <span class="hbadge hb-gold">⚽ Porra Oficial</span>
    <span class="hbadge hb-live" id="live-badge">● En juego</span>
    <span class="hbadge hb-dark" id="players-badge">— participantes</span>
  </div>
  <div class="updated-badge" id="updated-badge">Cargando datos...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('clasificacion')">🏆 Clasificación</button>
  <button class="tab" onclick="switchTab('resultados')">⚽ Resultados</button>
  <button class="tab" onclick="switchTab('grupos')">📊 Grupos</button>
  <button class="tab" onclick="switchTab('eliminatorias')">⚔ Eliminatorias</button>
</div>

<div class="main">
  <div id="tab-clasificacion" class="tab-pane active"></div>
  <div id="tab-resultados" class="tab-pane"></div>
  <div id="tab-grupos" class="tab-pane"></div>
  <div id="tab-eliminatorias" class="tab-pane"></div>
</div>

<script>
'use strict';

let DATA = null;
let lbFilter = '', lbSort = 'pts';
const GROUPS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

// ══════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════
function loadData(){
  // Data is embedded directly in this file as window.PORRA_DATA
  if(typeof window.PORRA_DATA !== 'undefined'){
    DATA = window.PORRA_DATA;
    onDataLoaded();
  } else {
    showError(new Error('No hay datos todavía. Genera el index.html desde el panel de control.'));
  }
}

function showError(e){
  document.getElementById('tab-clasificacion').innerHTML = `
    <div class="error-box">
      <b>No hay datos disponibles todavía</b><br><br>
      ${e.message}<br><br>
      Este fichero index.html se genera y publica desde el panel de control.<br>
      Si estás probando en local, abre el fichero desde un servidor web (no directamente como file://).<br>
      En VS Code: instala "Live Server" y ábrelo desde ahí.
    </div>`;
  document.getElementById('updated-badge').textContent = 'Error al cargar datos';
}

function onDataLoaded(){
  // Update header
  const d = new Date(DATA.meta.generated);
  document.getElementById('updated-badge').textContent =
    `Actualizado: ${d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})} a las ${d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('players-badge').textContent = `${DATA.meta.totalPlayers} participantes`;

  // Check if tournament has started
  const hasResults = Object.keys(DATA.groupResults).length > 0;
  document.getElementById('live-badge').textContent = hasResults ? '● En juego' : '⏳ Pendiente de inicio';

  renderPodium();
  renderClassificacion();
  renderResultados();
  renderGrupos();
  renderEliminatorias();
}

// ══════════════════════════════════════════════
// PODIUM
// ══════════════════════════════════════════════
function renderPodium(){
  const p = DATA.podium;
  if(!p.champion) return; // No final yet
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const teams = [p.champion, p.runnerUp, p.third, p.fourth];
  const labels = ['Campeón del Mundo','Subcampeón','3er Puesto','4º Puesto'];
  // Insert before tab-clasificacion content
}

// ══════════════════════════════════════════════
// CLASIFICACIÓN TAB
// ══════════════════════════════════════════════
function renderClassificacion(){
  const el = document.getElementById('tab-clasificacion');
  const lb = DATA.leaderboard;

  // Podium if final played
  let podiumHTML = '';
  if(DATA.podium.champion){
    const teams=[DATA.podium.champion,DATA.podium.runnerUp,DATA.podium.third,DATA.podium.fourth];
    const medals=['🥇','🥈','🥉','4️⃣'];
    const labels=['Campeón','Subcampeón','3er Puesto','4º Puesto'];
    podiumHTML=`<div class="podium" style="margin-bottom:24px">
      ${teams.map((t,i)=>t?`<div class="podium-card ${i===0?'first':''}">

  // Stats

  const statsHTML = `<div class="stat-row">

  </div>`;

  el.innerHTML = podiumHTML + statsHTML + `
    <div class="lb-toolbar">
      <input class="lb-search" type="text" placeholder="Buscar participante..." oninput="lbFilter=this.value;renderLBTable()">
      <select style="background:var(--bg4);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.72rem;padding:6px 8px;border-radius:3px;cursor:pointer" onchange="lbSort=this.value;renderLBTable()">

        <option value="name">Por nombre</option>
      </select>

        <span class="toggle-label" id="extToggleLabel">Vista extendida</span>
        <label class="toggle">

    </div>
    <div id="lb-table-wrap"></div>`;

  renderLBTable();
}

function renderLBTable(){
  const wrap = document.getElementById('lb-table-wrap');
  if(!wrap || !DATA) return;
  const ext = document.getElementById('extToggle')?.checked;
  const csvBtn = document.getElementById('extCsvBtn');
  if(csvBtn) csvBtn.style.display = ext ? 'inline-block' : 'none';
  const lbl = document.getElementById('extToggleLabel');
  if(lbl) lbl.textContent = ext ? 'Vista compacta' : 'Vista extendida';
  const wasExt = document.body.classList.contains('ext-mode');
  document.body.classList.toggle('ext-mode', !!ext);
  if(ext && !wasExt) window.scrollTo({top:0, behavior:'smooth'});
  let data = [...DATA.leaderboard];
  if(lbFilter) data = data.filter(p => p.name.toLowerCase().includes(lbFilter.toLowerCase()));
  if(lbSort === 'grupos') data.sort((a,b) => b.score.grupos - a.score.grupos);
  else if(lbSort === 'name') data.sort((a,b) => a.name.localeCompare(b.name));
  else data.sort((a,b) => b.score.total - a.score.total);

  if(ext){ wrap.innerHTML = renderExtTable(data); return; }

  const maxPts = DATA.leaderboard[0]?.score.total || 1;
  let html = `<table class="lb-table"><thead><tr>
    <th style="width:44px">Pos</th>
    <th>Participante</th>
    <th>Grupos</th><th>16avos</th><th>Oct/Ctos/SF</th><th>Final/Camp.</th><th>Premios</th>
    <th style="text-align:right">Total</th>
  </tr></thead><tbody>`;

  data.forEach(p => {
    const rank = DATA.leaderboard.findIndex(x => x.name === p.name) + 1;
    const sc = p.score;
    const rc = rank===1?'r1':rank===2?'r2':rank===3?'r3':'rx';
    const pct = maxPts > 0 ? Math.round(sc.total/maxPts*100) : 0;
    const koT = sc.r16 + sc.oct + sc.qf + sc.sf;
    const finT = sc.final + sc.tercero + sc.campeon;
    const uid = p.name.replace(/[^a-zA-Z0-9]/g,'_') + '_' + rank;
    html += `
      <tr onclick="toggleExpRow('${uid}')">
        <td class="lbc"><span class="rnum ${rc}">${rank}</span></td>
        <td class="lbc">
          <div class="lb-name">${esc(p.name)}</div>
          <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
        </td>
        <td class="lbc"><span class="cat-pts" style="color:${sc.grupos>0?'var(--blue)':'var(--muted)'}">${sc.grupos}</span></td>
        <td class="lbc"><span class="cat-pts" style="color:var(--cyan)">${sc.r16}</span></td>
        <td class="lbc"><span class="cat-pts" style="color:#f5a018">${koT}</span></td>
        <td class="lbc"><span class="cat-pts" style="color:var(--red)">${finT}</span></td>
        <td class="lbc"><span class="cat-pts" style="color:var(--green)">${sc.awards}</span></td>
        <td class="lbc"><div class="lb-pts-big">${sc.total}</div><div class="lb-pts-sub">pts</div></td>
      </tr>
      <tr class="exp-tr" id="exp_${uid}">
        <td class="exp-td" colspan="8">${renderPlayerBreakdown(p)}</td>
      </tr>`;
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderDetailBlock(title, items){
  const positive=(items||[]).filter(x=>(x.pts||0)>0);
  if(!positive.length) return '';
  return `<div>
    <div class="exp-sec">${esc(title)}</div>
    ${positive.map(x=>`
      <div class="pts-row">
        <span class="pts-label" style="font-size:.72rem">${esc(x.label||x.team||x.key)}</span>
        <span class="pts-val c-cyan">+${x.pts}</span>
      </div>`).join('')}
  </div>`;
}

function renderPlayerBreakdown(p){
  const sc = p.score;
  const det = sc.det || {};
  const cats = [
    {label:'Grupos', pts:sc.grupos, color:'var(--blue)'},
    {label:'16avos de Final', pts:sc.r16, color:'var(--cyan)'},
    {label:'Octavos', pts:sc.oct, color:'#f5c518'},
    {label:'Cuartos', pts:sc.qf, color:'#f5a018'},
    {label:'Semifinales', pts:sc.sf, color:'#f56418'},
    {label:'Clasificado Final', pts:sc.final, color:'var(--red)'},
    {label:'3er Puesto', pts:sc.tercero, color:'var(--muted)'},
    {label:'Campeón', pts:sc.campeon, color:'var(--gold)'},
    {label:'Premios individuales', pts:sc.awards, color:'var(--green)'},
  ];
  let html = '<div class="exp-grid">';
  html += `<div>
    <div class="exp-sec">Puntos por categoría</div>
    ${cats.filter(c=>c.pts>0).map(c=>`
      <div class="pts-row">
        <span class="pts-label">${c.label}</span>
        <span class="pts-val" style="color:${c.color}">+${c.pts}</span>
      </div>`).join('')}
    <div class="pts-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:4px">
      <span class="pts-label" style="font-weight:700">TOTAL</span>
      <span class="pts-val c-gold" style="font-size:1rem;font-family:var(--disp)">${sc.total}</span>
    </div>
  </div>`;

  // Group aciertos from det.groups
  const gmHits=(det.groups||[]).filter(d=>d.pts>0);
  if(gmHits.length){
    html+=`<div>
      <div class="exp-sec">Aciertos en grupos (${gmHits.length})</div>
      ${gmHits.map(d=>`
        <div class="pts-row">
          <span class="pts-label" style="font-size:.7rem">${esc(d.label||d.real)}</span>
          <span class="pts-val ${d.pts>=7?'c-gold':'c-green'}">+${d.pts}</span>
        </div>`).join('')}
    </div>`;
  }

  html += renderDetailBlock('16avos de Final', det.r16);
  html += renderDetailBlock('Octavos', det.oct);
  html += renderDetailBlock('Cuartos', det.qf);
  html += renderDetailBlock('Semifinales', det.sf);
  html += renderDetailBlock('Finalistas', det.final);
  html += renderDetailBlock('3er Puesto', det.tercero);
  html += renderDetailBlock('Campeón', det.campeon);
  html += renderDetailBlock('Premios', det.awards);

  html += '</div>';
  return html;
}

function toggleExpRow(uid){
  const row = document.getElementById('exp_' + uid);
  if(!row) return;
  const open = row.classList.contains('open');
  document.querySelectorAll('.exp-tr.open').forEach(r=>r.classList.remove('open'));
  if(!open) row.classList.add('open');
}

// Fallback tooltip for an extended-table cell: ensures KO/award cells always show a title.
function extCellTitle(cell, col){
  if(cell && cell.title) return cell.title;
  const koKinds = ['r16','oct','qf','sf','finalist','third','champion','award_bota','award_mvp'];
  if(koKinds.includes(col?.kind)){
    const real = col.team || col.label || '—';
    return `Apuesta: — | Real: ${real} | Sin puntos`;
  }
  return '';
}

// Extended table
function renderExtTable(data){
  const extData = DATA.extendedTable;
  if(!extData || !extData.columns || !extData.columns.length){
    return `<div style="text-align:center;padding:30px;color:var(--muted);font-family:var(--mono);font-size:.82rem">No hay datos de tabla extendida todavía.</div>`;
  }
  const cols = extData.columns;

  // Build top-header blocks (consecutive same label → merged)
  const ERL = {r16:'16avos',oct:'Octavos',qf:'Cuartos',sf:'Semis',finalist:'Finalistas',
                third:'3er P.',champion:'Campeón',award_bota:'Premios',award_mvp:'Premios'};
  const topBlocks = [];
  cols.forEach(c=>{
    const label = c.kind==='group' ? `GRP ${c.group}` : (ERL[c.kind]||c.kind);
    const last = topBlocks[topBlocks.length-1];
    if(last && last.label===label){ last.span++; }
    else { topBlocks.push({label, span:1, kind:c.kind}); }
  });

  // Helper: colour class for a hit cell
  const hitClass = k => k==='group'?'':
    k==='r16'?'ext-r16': k==='oct'?'ext-oct': k==='qf'?'ext-qf': k==='sf'?'ext-sf':
    k==='finalist'?'ext-finalist': k==='third'?'ext-third': k==='champion'?'ext-champion':
    (k==='award_bota'||k==='award_mvp')?'ext-award':'';

  // Top header row (block labels)
  const topRow = topBlocks.map(b=>{
    if(b.kind==='group')
      return `<th colspan="${b.span}" style="background:rgba(79,142,247,.08);color:var(--blue);border-color:rgba(79,142,247,.2);text-align:center">${esc(b.label)}</th>`;
    const colorMap={r16:'rgba(0,212,255,.1)',oct:'rgba(79,142,247,.1)',qf:'rgba(245,197,24,.09)',
                    sf:'rgba(245,130,24,.1)',finalist:'rgba(230,48,48,.09)',third:'rgba(100,180,100,.09)',
                    champion:'rgba(230,48,48,.12)',award_bota:'rgba(46,204,113,.09)',award_mvp:'rgba(46,204,113,.09)'};
    const textMap={r16:'#00d4ff',oct:'#4f8ef7',qf:'#f5c518',sf:'#f58218',finalist:'#e63030',
                   third:'#64b464',champion:'#e63030',award_bota:'#2ecc71',award_mvp:'#2ecc71'};
    const bg=colorMap[b.kind]||'transparent', cl=textMap[b.kind]||'var(--muted)';
    return `<th colspan="${b.span}" style="background:${bg};color:${cl};text-align:center">${esc(b.label)}</th>`;
  }).join('');

  // Column label row
  const colRow = cols.map(c=>{
    if(c.kind==='group'){
      return `<th style="background:rgba(79,142,247,.06);color:${c.label.includes('–')?'var(--cyan)':'var(--muted)'};border-color:rgba(79,142,247,.18);font-size:.56rem;white-space:nowrap" title="${esc(c.title)}">${esc(c.label)}</th>`;
    }
    const known=!!c.team;
    const colorMap={r16:'#00d4ff',oct:'#4f8ef7',qf:'#f5c518',sf:'#f58218',finalist:'#e63030',
                    third:'#64b464',champion:'#e63030',award_bota:'#2ecc71',award_mvp:'#2ecc71'};
    const cl=known?(colorMap[c.kind]||'var(--muted)'):'var(--muted)';
    return `<th style="font-size:.6rem;white-space:nowrap;color:${cl};${known?'font-weight:700':''}" title="${esc(c.title)}">${esc(c.label)}</th>`;
  }).join('');

  // Points row
  const ptsRow = cols.map(c=>{
    if(c.kind==='group'){
      return `<th style="background:rgba(79,142,247,.04);color:var(--muted);font-size:.52rem">${esc(c.group)}</th>`;
    }
    return `<th style="color:var(--muted);opacity:.7;font-size:.52rem">${esc(c.points||'')}</th>`;
  }).join('');

  let html = `<div class="ext-wrap"><table class="ext-table"><thead>
  <tr>
    <th class="name-hdr" rowspan="3" style="vertical-align:middle">Pos · Nombre</th>
    ${topRow}
    <th class="tot-hdr" rowspan="3" style="vertical-align:middle">TOTAL</th>
  </tr>
  <tr>${colRow}</tr>
  <tr>${ptsRow}</tr>
  </thead><tbody>`;

  // Build a lookup: player name → row in extData
  const extRowMap = {};
  extData.rows.forEach(r=>{ extRowMap[r.name]=r; });

  data.forEach(p=>{
    const rank = DATA.leaderboard.findIndex(x=>x.name===p.name)+1;
    const rc = rank===1?'r1':rank===2?'r2':rank===3?'r3':'rx';
    const extRow = extRowMap[p.name];
    html += `<tr><td class="name-cell"><span class="rnum ${rc}" style="margin-right:6px;font-size:1rem">${rank}</span>${esc(p.name)}</td>`;

    if(extRow){
      extRow.cells.forEach((cell,i)=>{
        const kind = cols[i]?.kind||'';
        const ttip = extCellTitle(cell, cols[i]);
        if(cell.display==='·' || cell.pts===0){
          // group zeros still show '0' not '·'
          const isGroup = kind==='group';
          html+=`<td class="ep ext-zero" title="${esc(ttip)}">${isGroup?'0':'·'}</td>`;
        } else {
          if(kind==='group'){
            const exactPts = DATA.meta?.scoringConfig?.pts_exact||7;
            const cls = cell.pts >= exactPts ? 'ext-exact' : 'ext-res';
            html+=`<td class="ep ${cls}" title="${esc(ttip)}">${esc(cell.display)}</td>`;
          } else {
            const cls = hitClass(kind);
            html+=`<td class="ep ${cls}" title="${esc(ttip)}">${esc(cell.display)}</td>`;
          }
        }
      });
    } else {
      cols.forEach(()=>{ html+=`<td class="ep ext-zero">·</td>`; });
    }

    html+=`<td class="tot-cell">${p.score.total}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// Download extended table as CSV from public page
function downloadPublicExtendedCSV(){
  const extData = DATA.extendedTable;
  if(!extData) return;
  const cols = extData.columns;
  const ERL = {r16:'16avos',oct:'Octavos',qf:'Cuartos',sf:'Semis',finalist:'Finalistas',
                group:'Grupos',third:'3er P.',champion:'Campeón',award_bota:'Premios',award_mvp:'Premios'};
  const csvEsc = v=>`"${String(v||'').replace(/"/g,'""')}"`;
  const hdr = ['Pos','Nombre',...cols.map(c=>`${ERL[c.kind]||c.kind}:${c.label}`),'TOTAL'];
  const rows = [hdr];
  extData.rows.forEach(r=>{
    rows.push([r.pos, r.name, ...r.cells.map(c=>c.pts>0?c.display:''), r.total]);
  });
  const csv = rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='clasificacion_extendida.csv'; a.click();
  URL.revokeObjectURL(url);
}

            <div class="podium-team">${teamHTML(t,false,false)}</div>
          </div>`).join('')}
      </div></div>`;
  }

  // Awards
  if(p.champion || DATA.awards.bota || DATA.awards.mvp){
    html+=`<div class="results-phase"><div class="phase-title">Premios Individuales</div>
      <div class="match-grid" style="max-width:500px">
        ${DATA.awards.bota?`<div class="match-card played" style="grid-template-columns:auto 1fr">
          <div style="font-size:1.5rem">👟</div>
          <div><div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">Bota de Oro</div>
          <div style="font-weight:700;font-size:.95rem">${esc(DATA.awards.bota)}</div></div>
        </div>`:''}
        ${DATA.awards.mvp?`<div class="match-card played" style="grid-template-columns:auto 1fr">
          <div style="font-size:1.5rem">⭐</div>
          <div><div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px">MVP del Torneo</div>
          <div style="font-weight:700;font-size:.95rem">${esc(DATA.awards.mvp)}</div></div>
        </div>`:''}
      </div></div>`;
  }

  el.innerHTML = html;
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const tabs=['clasificacion','resultados','grupos','eliminatorias'];
    b.classList.toggle('active',tabs[i]===tab);
  });
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  // ext-mode only applies to the clasificación tab
  if(tab !== 'clasificacion') document.body.classList.remove('ext-mode');
  else {
    const ext = document.getElementById('extToggle')?.checked;
    document.body.classList.toggle('ext-mode', !!ext);
  }
}
